<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#07090f" rx="45"/>

  <!-- Outer glow circle -->
  <circle cx="96" cy="96" r="85" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.3"/>

  <!-- Insulin syringe -->
  <g>
    <!-- Needle -->
    <line x1="96" y1="40" x2="96" y2="75" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>

    <!-- Needle tip (triangle) -->
    <polygon points="96,38 93,45 99,45" fill="#0ea5e9"/>

    <!-- Barrel/plunger housing -->
    <rect x="75" y="75" width="42" height="65" rx="6" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>

    <!-- Plunger rod -->
    <rect x="84" y="70" width="24" height="10" rx="3" fill="#0ea5e9"/>

    <!-- Measurement marks on barrel -->
    <g stroke="#0ea5e9" stroke-width="1.5" opacity="0.6">
      <line x1="72" y1="88" x2="75" y2="88"/>
      <line x1="72" y1="105" x2="75" y2="105"/>
      <line x1="72" y1="122" x2="75" y2="122"/>
    </g>

    <!-- Liquid inside barrel -->
    <rect x="78" y="110" width="36" height="25" rx="3" fill="#0ea5e9" opacity="0.2"/>

    <!-- Gradient reflection -->
    <rect x="78" y="110" width="12" height="25" rx="3" fill="#38bdf8" opacity="0.3"/>
  </g>

  <!-- Pulse waves indicating insulin action -->
  <g stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 40 96 Q 45 90 50 96 T 60 96" stroke-dasharray="2,2"/>
    <path d="M 132 96 Q 137 90 142 96 T 152 96" stroke-dasharray="2,2"/>
  </g>

  <!-- Optional: Plus/cross symbol for health/medical -->
  <g stroke="#0ea5e9" stroke-width="2" fill="none" opacity="0.3">
    <line x1="150" y1="150" x2="170" y2="170"/>
    <line x1="170" y1="150" x2="150" y2="170"/>
  </g>
</svg>
