    // ─── INSULIN ACTION ─────────────────────────────────────────────────────────
    const calcIOB=(units,minElapsed,tailMin)=>{const absorptionFactor=Math.max(0,1-(minElapsed/tailMin));return parseFloat((units*absorptionFactor).toFixed(1));};

    // ─── WEIGHT-BASED SUGGESTIONS ───────────────────────────────────────────────
    const calcWeightSuggestions = (kg) => {
      const tdd = Math.round(kg * 0.5 * 2) / 2;
      const basal = Math.round(tdd * 0.5 * 2) / 2;
      const icr = Math.round(500 / tdd);
      const isfMg = Math.round(1700 / tdd);
      return { tdd, basal, icr, isfMg };
    };

    // ─── POST-MEAL CORRECTION ───────────────────────────────────────────────────
    const calcPostMealCorrection = (pmG, targetG, isf, iob) => {
      const ecartGL = Math.max(0, pmG - targetG);
      const rawUnits = (ecartGL * 10) / isf;
      if (pmG >= 3.0) {
        return { status: "urgent_override", units: Math.round((rawUnits * 0.5) * 2) / 2, rawUnits: Math.round(rawUnits * 2) / 2, iob: iob, ecartGL };
      }
      if (pmG >= 2.5) {
        return { status: "high_override", units: Math.round((rawUnits * 0.4) * 2) / 2, rawUnits: Math.round(rawUnits * 2) / 2, iob, ecartGL };
      }
      if (pmG >= 2.0) {
        return { status: "warn_override", units: Math.round((rawUnits * 0.3) * 2) / 2, rawUnits: Math.round(rawUnits * 2) / 2, iob, ecartGL };
      }
      const netUnits = Math.max(0, rawUnits - iob);
      return { status: "ok_low", units: Math.round(netUnits * 2) / 2, rawUnits: Math.round(rawUnits * 2) / 2, iob, ecartGL };
    };

    // ─── FAT FACTOR ─────────────────────────────────────────────────────────────
    const FAT_FACTOR = { élevé: 0.25, moyen: 0.12, faible: 0 };

    // ─── GI & FAT ANALYSIS ──────────────────────────────────────────────────────
    const GI_COLOR = { élevé: "#f97316", moyen: "#f59e0b", faible: "#22c55e" };
    const GI_ICON = { élevé: "🔴", moyen: "🟡", faible: "🟢" };
    const getOverallFat = (selections) => {
      const fats = selections.map(s => s.food.fat).filter(Boolean);
      if (!fats.length) return "faible";
      if (fats.some(f => f === "élevé")) return "élevé";
      if (fats.some(f => f === "moyen")) return "moyen";
      return "faible";
    };
    const getDominantGI = (selections) => {
      const gis = selections.map(s => s.food.gi).filter(Boolean);
      if (!gis.length) return "moyen";
      if (gis.some(g => g === "élevé")) return "élevé";
      if (gis.some(g => g === "moyen")) return "moyen";
      return "faible";
    };

    // ─── SCHEDULE BUILDING ──────────────────────────────────────────────────────
    const round05 = (v) => Math.round(v * 2) / 2;
    const buildSchedule = (totalCarbs, bolusRepas, correction, fatBonus, gVal, targetG, digestionKey, bolusType, dominantGI) => {
      const dp = DIGESTION_PROFILES[digestionKey];
      const schedule = [];
      const hasCorrection = gVal > targetG;
      const hasFat = fatBonus > 0;
      const hasSlowGI = dominantGI === "élevé";
      if (hasCorrection && gVal >= 1.8 && gVal <= 2.5) {
        schedule.push({ time: "-10 min", icon: "💉", color: "#a78bfa", units: Math.round(correction * 2) / 2, label: "Correction", note: `Baisse glycémie de ${gVal.toFixed(1)} à ${targetG.toFixed(1)} g/L` });
      }
      if (bolusType === "standard") {
        schedule.push({ time: "0 min (immédiat)", icon: "💉", color: "#0ea5e9", units: Math.round((bolusRepas + correction + fatBonus) * 2) / 2, label: "Injection", note: `1 injection unique · Repas ${totalCarbs}g` });
      } else {
        schedule.push({ time: "0 min (immédiat)", icon: "💉", color: "#0ea5e9", units: Math.round(bolusRepas * 2) / 2, label: "Bolus rapide", note: "Partie rapide pour glucides immédiaTs" });
        schedule.push({ time: "+20 min", icon: "⏱️", color: "#f59e0b", units: null, label: "Pause", note: "Attendre avant injection lente" });
        const dualDose = Math.round((correction + fatBonus) * 2) / 2;
        schedule.push({ time: "+20 min", icon: "💉", color: "#f59e0b", units: dualDose > 0 ? dualDose : null, label: "Bolus lent", note: dualDose > 0 ? `Correction + gâce pour graisses (${(Math.round(dualDose * 2) / 2)} U)` : "Graisses couvertes par bolus rapide" });
      }
      schedule.push({ time: `+${dp.peakMin} min`, icon: dp.icon, color: "#7dd3fc", units: null, label: "Pic d'absorption", note: `Glycémie au plus haut · Contrôlez si faisable` });
      schedule.push({ time: `+${Math.round(dp.tail / 60)}h`, icon: "✓", color: "#22c55e", units: null, label: "Fin d'action", note: "Insuline presque complètement absorbée" });
      return schedule;

            <div style={{fontSize:10,color:"#2d3f50",marginTop:4}}>{food.unit} × {mult} = <strong style={{color:"#3d7fa0"}}>{rc}g</strong> glucides{food.note?<span style={{color:"#1a3040"}}> · {food.note}</span>:""}</div>

      );

    // ─── INJECTION STEP CARD ─────────────────────────────────────────────────────

            {index<total-1&&<div style={{width:2,flex:1,minHeight:18,background:"linear-gradient(180deg,#1c2a38,transparent)",marginTop:4}}/>}
          </div>
          <div style={{flex:1,paddingBottom:index<total-1?18:0}}>

    // ─── POST-MEAL CORRECTOR ─────────────────────────────────────────────────────
    function PostMealCorrector({initialDose, isf, targetG, digestionKey}){
      const [pmGlycemia, setPmGlycemia] = useState("");
      const [pmTime, setPmTime] = useState("90");
      const dp = DIGESTION_PROFILES[digestionKey];
      const timeOptions = [
        {v:"60",  l:"1h après"},
        {v:"90",  l:"1h30 après"},
        {v:"120", l:"2h après"},
        {v:"180", l:"3h après"},
        {v:"240", l:"4h après"},
      ];

      const pmG = parseFloat(pmGlycemia);
      const tMin = parseInt(pmTime);
      const iob = calcIOB(initialDose, tMin, dp.tail);

      const corr = !isNaN(pmG) && pmG > 0
        ? calcPostMealCorrection(pmG, targetG, isf, iob)
        : null;

      const glycColor=v=>{if(!v||isNaN(v))return"#2d3f50";if(v<0.7)return"#ef4444";if(v<1.0)return"#f97316";if(v<=1.8)return"#22c55e";if(v<=2.0)return"#f59e0b";if(v<=2.5)return"#f97316";if(v<=3.0)return"#ef4444";return"#dc2626";};
      const C={accent:"#0ea5e9",green:"#22c55e",yellow:"#f59e0b",red:"#ef4444",muted:"#4a6070",faint:"#0f161e",border:"#1c2a38",card:"#0d1117"};

      return(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18,marginBottom:12}}>
          <div style={{fontSize:10,letterSpacing:2,color:C.accent,marginBottom:14,textTransform:"uppercase"}}>🩸 Calculateur post-repas</div>
          <div style={{fontSize:11,color:"#3d5a73",marginBottom:14}}>Saisissez votre glycémie mesurée après le repas pour obtenir la dose de correction éventuelle.</div>

          {/* Time selector */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>Temps écoulé depuis le repas</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {timeOptions.map(opt=>(
                <button key={opt.v} onClick={()=>setPmTime(opt.v)} style={{flex:1,minWidth:50,padding:"8px 4px",border:`1px solid ${pmTime===opt.v?"#0ea5e9":C.border}`,borderRadius:8,background:pmTime===opt.v?"rgba(14,165,233,0.15)":"#070c12",color:pmTime===opt.v?"#7dd3fc":C.muted,fontFamily:"'IBM Plex Mono',monospace",fontSize:10,cursor:"pointer",fontWeight:pmTime===opt.v?700:400,transition:"all 0.12s"}}>
                  {opt.l}
                </button>
              ))}
            </div>
          </div>

          {/* Glycemia input */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>Glycémie mesurée (g/L)</div>
            <input type="number" step="0.1" min="0.1" max="6" placeholder="ex : 2.10" value={pmGlycemia} onChange={e=>setPmGlycemia(e.target.value)}
              style={{width:"100%",background:"#070c12",border:`1px solid ${C.border}`,borderRadius:8,color:pmG?glycColor(pmG):"#c8d6e5",padding:"12px 14px",fontSize:22,fontFamily:"'IBM Plex Mono',monospace",outline:"none",boxSizing:"border-box",fontWeight:700,textAlign:"center"}}/>
          </div>

          {/* IOB display */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={{flex:1,background:"#070c12",borderRadius:8,padding:"8px 10px",border:`1px solid ${C.faint}`}}>
              <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:3}}>INSULINE ENCORE ACTIVE (IOB)</div>
              <div style={{fontSize:16,fontWeight:700,color:"#a78bfa"}}>{iob} U</div>
              <div style={{fontSize:9,color:"#2d3f50",marginTop:2}}>à {tMin} min après injection</div>
            </div>
            <div style={{flex:1,background:"#070c12",borderRadius:8,padding:"8px 10px",border:`1px solid ${C.faint}`}}>
              <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:3}}>CIBLE</div>
              <div style={{fontSize:16,fontWeight:700,color:C.green}}>{targetG.toFixed(1)} g/L</div>
              <div style={{fontSize:9,color:"#2d3f50",marginTop:2}}>glycémie souhaitée</div>
            </div>
          </div>

          {/* Result */}
          {corr && (() => {
            // ── HYPOGLYCÉMIE ──
            if (corr.status === "ok_low" && pmG < 0.8) return (
              <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(239,68,68,0.1)",border:"2px solid rgba(239,68,68,0.5)"}}>
                <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:6}}>🚨 HYPOGLYCÉMIE — Agir immédiatement</div>
                <div style={{fontSize:12,color:"#fca5a5",lineHeight:1.7}}>
                  Glycémie critique : <strong>{pmG.toFixed(1)} g/L</strong><br/>
                  → Prendre 15g de sucres rapides (3 sucres, 150ml jus d'orange)<br/>
                  → Contrôler à nouveau dans 15 minutes<br/>
                  → Ne pas injecter d'insuline
                </div>
              </div>
            );

            // ── ZONE CIBLE ou LÉGÈREMENT BAS ──
            if (corr.status === "ok_low") return (
              <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.3)"}}>
                <div style={{fontSize:14,fontWeight:700,color:C.green,marginBottom:6}}>✅ Aucune correction nécessaire</div>
                <div style={{fontSize:11,color:"#3d6b4a",lineHeight:1.6}}>
                  Glycémie à <strong>{pmG.toFixed(1)} g/L</strong> — en dessous ou dans la cible ({targetG.toFixed(1)} g/L)<br/>
                  IOB encore actif : {iob} U<br/>
                  Pas d'injection supplémentaire.
                </div>
              </div>
            );

            // ── URGENCE — glycémie ≥ 3.0 g/L malgré IOB ──
            if (corr.status === "urgent_override") return (
              <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(220,38,38,0.15)",border:"2px solid rgba(220,38,38,0.6)"}}>
                <div style={{fontSize:12,letterSpacing:1,color:"#dc2626",marginBottom:8,textTransform:"uppercase"}}>🏥 URGENCE — Correction immédiate obligatoire</div>
                <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                  <span style={{fontSize:48,fontWeight:900,fontFamily:"'Syne Mono',monospace",color:"#dc2626",lineHeight:1}}>{corr.units}</span>
                  <span style={{fontSize:16,color:C.muted}}>unités à injecter</span>
                </div>
                <div style={{fontSize:10,color:"#fca5a5",lineHeight:1.7,marginBottom:8}}>
                  Glycémie : <strong style={{color:"#dc2626"}}>{pmG.toFixed(1)} g/L</strong> — seuil critique ≥ 3.0 g/L<br/>
                  Correction brute : {corr.rawUnits} U · IOB estimé : {iob} U<br/>
                  <strong>Dose de sécurité appliquée : 50% du brut malgré l'IOB</strong><br/>
                  → Contrôler dans 45 min. Si pas de baisse → re-corriger.
                </div>
                <div style={{padding:"8px 10px",background:"rgba(220,38,38,0.1)",borderRadius:7,fontSize:10,color:"#fca5a5",borderLeft:"2px solid rgba(220,38,38,0.5)"}}>
                  🏥 Consultez immédiatement votre médecin ou urgences si la glycémie persiste au-dessus de 3.0 g/L.
                </div>
              </div>
            );

            // ── HYPERGLYCÉMIE SÉVÈRE — glycémie 2.5–3.0 g/L, injection malgré IOB ──
            if (corr.status === "high_override") return (
              <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(239,68,68,0.12)",border:"2px solid rgba(239,68,68,0.5)"}}>
                <div style={{fontSize:12,letterSpacing:1,color:C.red,marginBottom:8,textTransform:"uppercase"}}>🚨 Hyperglycémie sévère — Injection recommandée</div>
                <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                  <span style={{fontSize:48,fontWeight:900,fontFamily:"'Syne Mono',monospace",color:C.red,lineHeight:1}}>{corr.units}</span>
                  <span style={{fontSize:16,color:C.muted}}>unités à injecter</span>
                </div>
                <div style={{fontSize:10,color:"#fca5a5",lineHeight:1.7,marginBottom:8}}>
                  Glycémie : <strong style={{color:C.red}}>{pmG.toFixed(1)} g/L</strong> — seuil sévère 2.5–3.0 g/L<br/>
                  Correction brute : {corr.rawUnits} U · IOB estimé : {iob} U<br/>
                  <strong>Dose de sécurité : 40% du brut malgré l'IOB</strong><br/>
                  → Contrôler dans 45–60 min.
                </div>
                <div style={{padding:"8px 10px",background:"rgba(239,68,68,0.08)",borderRadius:7,fontSize:10,color:"#fca5a5",borderLeft:"2px solid rgba(239,68,68,0.4)"}}>
                  Si la glycémie ne baisse pas dans 1h → consulter votre médecin.
                </div>
              </div>
            );

            // ── HYPERGLYCÉMIE — glycémie 2.0–2.5 g/L, injection malgré IOB ──
            if (corr.status === "warn_override") return (
              <div style={{padding:"14px 16px",borderRadius:10,background:"rgba(249,115,22,0.10)",border:"1px solid rgba(249,115,22,0.5)"}}>
                <div style={{fontSize:12,letterSpacing:1,color:"#f97316",marginBottom:8,textTransform:"uppercase"}}>⚠️ Hyperglycémie — Injection recommandée</div>
                <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                  <span style={{fontSize:48,fontWeight:900,fontFamily:"'Syne Mono',monospace",color:"#f97316",lineHeight:1}}>{corr.units}</span>
                  <span style={{fontSize:16,color:C.muted}}>unités à injecter</span>
                </div>
                <div style={{fontSize:11,color:"#fdba74",lineHeight:1.7,marginBottom:8}}>
                  Glycémie : <strong>{pmG.toFixed(1)} g/L</strong> — au-dessus de 2.0 g/L<br/>
                  Correction brute : {corr.rawUnits} U · IOB estimé : {iob} U<br/>
                  <strong>Dose prudente : 30% du brut malgré l'IOB</strong><br/>
                  → Contrôler dans 1h. Si pas de baisse significative → re-corriger.
                </div>
                <div style={{padding:"8px 10px",background:"rgba(249,115,22,0.08)",borderRadius:7,fontSize:10,color:"#fdba74",borderLeft:"2px solid rgba(249,115,22,0.4)"}}>
                  ⚕️ À 2.0+ g/L, une correction s'impose même avec de l'insuline encore active.
                </div>
              </div>
            );

            // ── CORRECTION NORMALE ──
            return (
              <div style={{padding:"14px 16px",borderRadius:10,background:`${glycColor(pmG)}12`,border:`1px solid ${glycColor(pmG)}44`}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Dose de correction recommandée</div>
                <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
                  <span style={{fontSize:52,fontWeight:900,fontFamily:"'Syne Mono',monospace",color:glycColor(pmG),lineHeight:1}}>{corr.units}</span>
                  <span style={{fontSize:16,color:C.muted}}>unités</span>
                </div>
                {/* Calculation detail */}
                <div style={{background:"#070c12",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                  <div style={{fontSize:9,color:"#2d3f50",letterSpacing:1,marginBottom:6}}>DÉTAIL DU CALCUL</div>
                  {[
                    {label:`Glycémie mesurée`,      val:`${pmG.toFixed(1)} g/L`},
                    {label:`Cible`,                 val:`${targetG.toFixed(1)} g/L`},
                    {label:`Écart`,                 val:`+${corr.ecartGL} g/L (+${Math.round(corr.ecartGL*100)} mg/dL)`},
                    {label:`Correction brute`,      val:`${corr.rawUnits} U`},
                    {label:`IOB déduit (${tMin}min)`,val:`−${corr.iob} U`},
                    {label:`Correction nette`,      val:`${corr.units} U`, bold:true},
                  ].map((row,i,arr)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",color:row.bold?glycColor(pmG):"#4a6070",fontWeight:row.bold?700:400,borderTop:i===arr.length-1?"1px solid #1c2a38":"none",marginTop:i===arr.length-1?4:0,paddingTop:i===arr.length-1?7:3}}>
                      <span>{row.label}</span><span>{row.val}</span>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#2d3f50",padding:"6px 10px",background:"rgba(0,0,0,0.15)",borderRadius:7,borderLeft:`2px solid ${glycColor(pmG)}44`}}>
                  ⚕️ Vérifiez toujours avec votre médecin avant de corriger.
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────────
    function App(){
      const [tab,        setTab]        = useState("repas");
      const [glycemia,   setGlycemia]   = useState("");
      const [search,     setSearch]     = useState("");
      const [openCat,    setOpenCat]    = useState("🥘 Tajines");
      const [expandedId, setExpandedId] = useState(null);
      const [selections, setSelections] = useState([]);
      const [ratio,      setRatio]      = useState(10);
      const [isf,        setIsf]        = useState(50);
      const [targetG,    setTargetG]    = useState(1.2);
      const [digestion,  setDigestion]  = useState("normal");
      const [weight,     setWeight]     = useState("");
      const [result,     setResult]     = useState(null);

      const weightKg  = parseFloat(weight);
      const weightOk  = !isNaN(weightKg) && weightKg >= 20 && weightKg <= 200;
      const wSugg     = weightOk ? calcWeightSuggestions(weightKg) : null;

      const filteredDB=useMemo(()=>{
        if(!search.trim())return FOOD_DB;
        const q=search.toLowerCase();
        const out={};
        for(const [cat,foods] of Object.entries(FOOD_DB)){
          const f=foods.filter(fd=>fd.name.toLowerCase().includes(q)||(fd.note&&fd.note.toLowerCase().includes(q)));
          if(f.length)out[cat]=f;
        }
        return out;
      },[search]);

      const totalCarbs  = useMemo(()=>Math.round(selections.reduce((s,sel)=>s+sel.food.carbs*sel.mult,0)),[selections]);
      const dominantFat = useMemo(()=>getOverallFat(selections),[selections]);
      const dominantGI  = useMemo(()=>getDominantGI(selections),[selections]);

      const gVal   = parseFloat(glycemia);
      const glycOk = !isNaN(gVal)&&gVal>0;
      const canCalc= glycOk&&totalCarbs>0;

      const glycColor=v=>{if(!v||isNaN(v))return"#2d3f50";if(v<0.7)return"#ef4444";if(v<1.0)return"#f97316";if(v<=1.8)return"#22c55e";if(v<=2.0)return"#f59e0b";if(v<=2.5)return"#f97316";if(v<=3.0)return"#ef4444";return"#dc2626";};
      const glycLabel=v=>{if(!v||isNaN(v))return"—";if(v<0.7)return"⚠ Hypoglycémie sévère";if(v<1.0)return"Limite basse";if(v<=1.8)return"✓ Zone cible";if(v<=2.0)return"Élevée";if(v<=2.5)return"⚠ Hyperglycémie";if(v<=3.0)return"🚨 Hyper sévère";return"🚨 URGENCE MÉDICALE";};

      const toggleFood=food=>{
        setSelections(prev=>{
          const ex=prev.find(s=>s.food.id===food.id);
          if(ex){setExpandedId(null);return prev.filter(s=>s.food.id!==food.id);}
          const profile=QTY_PROFILES[food.qty]||QTY_PROFILES["plat"];
          const defaultM=profile.find(s=>Math.abs(s.m-1)<0.01)?.m||profile[Math.floor(profile.length/2)].m;
          setExpandedId(food.id);
          return[...prev,{food,mult:defaultM}];
        });
      };
      const updateMult=(id,mult)=>setSelections(prev=>prev.map(s=>s.food.id===id?{...s,mult}:s));

      const calculate=()=>{
        if(!canCalc)return;
        const bolusRepas=totalCarbs/ratio;
        const ecart=gVal-targetG;
        const correction=ecart>0?(ecart*10)/isf:0;
        const fatBonus=(totalCarbs/ratio)*FAT_FACTOR[dominantFat];
        const total=round05(bolusRepas+correction+fatBonus);
        const hasFat=dominantFat==="élevé"||dominantFat==="moyen";
        const bolusType=hasFat?"dual":"standard";
        const schedule=buildSchedule(totalCarbs,bolusRepas,correction,fatBonus,gVal,targetG,digestion,bolusType,dominantGI);
        const warnings=[];
        if(gVal<1.0)warnings.push({t:"w",txt:"Glycémie basse → adapter le délai"});
        if(gVal>2.0)warnings.push({t:"w",txt:"Glycémie élevée → contrôler dans 2h"});
        if(bolusType==="dual")warnings.push({t:"i",txt:"Repas gras → bolus en 2 phases"});
        if(dominantGI==="élevé")warnings.push({t:"c",txt:"IG élevé → pic glycémique rapide (30–45 min)"});
        if(total>20)warnings.push({t:"w",txt:"Dose élevée → consultez votre médecin"});
        setResult({total,bolusType,warnings,schedule,bolusRepas:+bolusRepas.toFixed(1),correction:+correction.toFixed(1),fatBonus:+fatBonus.toFixed(1)});
        setTab("resultat");
      };

      const C={bg:"#07090f",card:"#0d1117",border:"#1c2a38",accent:"#0ea5e9",adim:"rgba(14,165,233,0.12)",text:"#c8d6e5",muted:"#4a6070",faint:"#0f161e",green:"#22c55e",yellow:"#f59e0b",red:"#ef4444"};
      const card={background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:18,marginBottom:12};
      const lbl={fontSize:10,letterSpacing:2,color:C.muted,textTransform:"uppercase",marginBottom:8,display:"block"};
      const inp={width:"100%",background:"#070c12",border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"11px 14px",fontSize:15,fontFamily:"'IBM Plex Mono',monospace",outline:"none",boxSizing:"border-box"};

      return(
        <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'IBM Plex Mono',monospace",color:C.text}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Syne+Mono&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');
            *{box-sizing:border-box;margin:0;padding:0;}
            input:focus{border-color:#0ea5e9!important;box-shadow:0 0 0 2px rgba(14,165,233,0.1);}
            .fr:hover{background:rgba(14,165,233,0.04)!important;}
            .cb:hover{color:#7dd3fc!important;}
            .tb:hover{color:#7dd3fc!important;}
            ::-webkit-scrollbar{width:3px;}
            ::-webkit-scrollbar-thumb{background:#1c2a38;border-radius:99px;}
          `}</style>

          {/* HEADER */}
          <div style={{background:"linear-gradient(180deg,#0d1117,transparent)",padding:"24px 20px 14px",borderBottom:`1px solid ${C.faint}`}}>
            <div style={{maxWidth:520,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

                    return(
                      <div key={i} style={{padding:"8px 4px",borderRadius:8,textAlign:"center",background:isActive?`${z.color}22`:"#070c12",border:`1px solid ${isActive?z.color:C.faint}`,transition:"all 0.3s"}}>
                        <div style={{fontSize:9,color:z.color,fontWeight:isActive?700:400,marginBottom:2}}>{z.zone}</div>
                        <div style={{fontSize:8,color:isActive?z.color:"#2d3f50"}}>{z.label}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* ── BOUTON CALCULER ── */}
              <button onClick={calculate} style={{width:"100%",padding:16,borderRadius:12,cursor:canCalc?"pointer":"not-allowed",background:canCalc?"linear-gradient(135deg,#0ea5e9,#0284c7)":C.card,border:canCalc?"none":`1px solid ${C.border}`,color:canCalc?"#fff":C.muted,fontSize:14,fontWeight:700,fontFamily:"'Syne Mono',monospace",marginBottom:4}}>
                {canCalc
                  ? `⚡ Calculer — ${totalCarbs}g glucides · glycémie ${gVal.toFixed(1)} g/L`
                  : `⚠ ${!glycOk && !selections.length ? "Saisissez glycémie + sélectionnez des aliments" : !glycOk ? "Saisissez votre glycémie" : "Sélectionnez des aliments (onglet Repas)"}`
                }
              </button>
            </>)}

            {/* ═══ RÉSULTAT ═══ */}
            {tab==="resultat"&&(<>
              {!result?(
                <div style={{...card,textAlign:"center",padding:48}}>
                  <div style={{fontSize:36,marginBottom:14}}>⚡</div>
                  <div style={{color:C.muted,fontSize:13,lineHeight:1.7}}>Sélectionnez vos aliments,<br/>saisissez votre glycémie,<br/>puis lancez le calcul</div>
                  <button onClick={()=>setTab("repas")} style={{marginTop:18,background:C.adim,border:"1px solid rgba(14,165,233,0.3)",color:C.accent,borderRadius:8,padding:"10px 20px",fontFamily:"'IBM Plex Mono',monospace",fontSize:12,cursor:"pointer"}}>→ Sélectionner les aliments</button>
                </div>
              ):(<>
                {/* Total */}
                <div style={{...card,borderColor:"rgba(14,165,233,0.3)",background:"linear-gradient(135deg,#0d1117,#0a1520)"}}>
                  <div style={{fontSize:10,letterSpacing:2,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>Dose totale calculée</div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:8}}>
                    <div style={{fontSize:72,fontWeight:700,lineHeight:1,fontFamily:"'Syne Mono',monospace",background:"linear-gradient(135deg,#7dd3fc,#0ea5e9)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{result.total}</div>
                    <div style={{color:C.muted,fontSize:18,marginBottom:10}}>unités totales</div>
                  </div>
                  <div style={{display:"inline-block",marginBottom:14,background:result.bolusType==="dual"?"rgba(245,158,11,0.12)":"rgba(14,165,233,0.12)",border:`1px solid ${result.bolusType==="dual"?"rgba(245,158,11,0.4)":"rgba(14,165,233,0.35)"}`,color:result.bolusType==="dual"?C.yellow:C.accent,borderRadius:99,padding:"4px 14px",fontSize:11}}>
                    {result.bolusType==="dual"?"⚡ Bolus DUAL — 2 injections":"💉 Bolus STANDARD — 1 injection"}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {[{label:"Repas",val:`${result.bolusRepas} U`,color:C.accent},{label:"Correction",val:result.correction>0?`+${result.correction} U`:"—",color:result.correction>0?C.yellow:"#2d3f50"},{label:"Graisses",val:result.fatBonus>0?`+${result.fatBonus} U`:"—",color:result.fatBonus>0?"#a78bfa":"#2d3f50"}].map((it,i)=>(
                      <div key={i} style={{background:"#070c12",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.muted,marginBottom:3}}>{it.label.toUpperCase()}</div>
                        <div style={{fontSize:14,color:it.color,fontWeight:700}}>{it.val}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Timeline */}
                <div style={{...card,borderColor:"rgba(14,165,233,0.2)"}}>
                  <div style={{...lbl,color:C.accent}}>📅 Calendrier d'injections</div>
                  <div style={{marginBottom:12,padding:"8px 12px",background:"rgba(14,165,233,0.05)",borderRadius:8,fontSize:10,color:C.muted,display:"flex",gap:6,alignItems:"center"}}>
                    <span>{DIGESTION_PROFILES[digestion].icon}</span>
                    <span>Digestion <strong style={{color:C.accent}}>{DIGESTION_PROFILES[digestion].label}</strong> · Pic {DIGESTION_PROFILES[digestion].peakMin}min · Fin d'action {Math.round(DIGESTION_PROFILES[digestion].tail/60*10)/10}h</span>
                  </div>
                  <div style={{padding:"4px 0"}}>
                    {result.schedule.map((step,i)=>(
                      <InjectionStep key={i} step={step} index={i} total={result.schedule.length}/>
                    ))}
                  </div>
                </div>

                {/* Post-meal corrector */}
                <PostMealCorrector
                  initialDose={result.total}
                  isf={isf}
                  targetG={targetG}
                  digestionKey={digestion}
                />

                {/* Warnings */}
                {result.warnings.length>0&&(
                  <div style={card}>
                    {result.warnings.map((w,i)=>(
                      <div key={i} style={{borderRadius:8,padding:"9px 12px",marginBottom:i<result.warnings.length-1?8:0,fontSize:11,background:w.t==="w"?"rgba(239,68,68,0.08)":w.t==="c"?"rgba(245,158,11,0.08)":"rgba(34,197,94,0.08)",border:`1px solid ${w.t==="w"?"rgba(239,68,68,0.3)":w.t==="c"?"rgba(245,158,11,0.3)":"rgba(34,197,94,0.3)"}`,color:w.t==="w"?"#fca5a5":w.t==="c"?"#fcd34d":"#86efac"}}>
                        {w.t==="w"?"⚠️":w.t==="c"?"🔔":"✅"} {w.txt}
                      </div>
                    ))}
                  </div>
                )}

                {/* Meal recap */}
                <div style={card}>
                  <div style={lbl}>Récapitulatif du repas</div>
                  {selections.map((s,i)=>{
                    const profile=QTY_PROFILES[s.food.qty]||QTY_PROFILES["plat"];
                    const qLabel=profile.find(p=>Math.abs(p.m-s.mult)<0.01)?.l||`×${s.mult}`;
                    return(<div key={s.food.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"6px 0",borderBottom:i<selections.length-1?`1px solid ${C.faint}`:"none"}}><span style={{color:"#7aa0b8"}}>{s.food.name} <span style={{color:"#3d5a73"}}>{qLabel}</span></span><span style={{color:C.accent}}>{Math.round(s.food.carbs*s.mult)}g</span></div>);
                  })}
                  <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${C.border}`,marginTop:4,fontWeight:700}}>
                    <span style={{color:C.muted,fontSize:12}}>Total</span>
                    <span style={{color:C.accent,fontSize:14}}>{totalCarbs}g glucides</span>
                  </div>
                </div>

                <div style={{fontSize:10,color:"#2d3f50",padding:"10px 14px",background:"rgba(14,165,233,0.03)",borderRadius:10,borderLeft:`2px solid ${C.accent}`}}>
                  ⚕️ Ces calculs sont indicatifs. Ne modifiez jamais votre traitement sans l'accord de votre endocrinologue.
                </div>
              </>)}
            </>)}

            {/* ═══ PARAMÈTRES ═══ */}
            {tab==="params"&&(
              <div>

                {/* Poids saisi dans l'onglet Saisie */}
                {/* MANUAL PARAMS */}
                <div style={card}>
                  <div style={{fontSize:10,letterSpacing:2,color:C.accent,marginBottom:14,textTransform:"uppercase"}}>Paramètres manuels</div>

                  {[{label:"Ratio insuline / glucides (ICR)",val:ratio,set:setRatio,min:5,max:25,step:1,display:`1 U / ${ratio}g`,note:`1 unité couvre ${ratio}g de glucides`,color:C.accent},{label:"Facteur de correction (ISF)",val:isf,set:setIsf,min:20,max:100,step:5,display:`${isf} mg/dL`,note:`1 unité baisse de ${isf} mg/dL (${(isf/100).toFixed(2)} g/L)`,color:"#a78bfa"}].map((p,i)=>(
                    <div key={i} style={{marginBottom:20}}>
                      <label style={lbl}>{p.label}</label>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <input type="range" min={p.min} max={p.max} step={p.step} value={p.val} onChange={e=>p.set(Number(e.target.value))} style={{flex:1,accentColor:p.color}}/>
                        <div style={{background:"#070c12",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",color:p.color,fontFamily:"'IBM Plex Mono',monospace",fontSize:13,minWidth:90,textAlign:"center"}}>{p.display}</div>
                      </div>
                      <div style={{color:"#2d3f50",fontSize:10,marginTop:4}}>{p.note}</div>
                    </div>
                  ))}

                  <div style={{marginBottom:20}}>
                    <label style={lbl}>Glycémie cible</label>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <input type="range" min={1.0} max={1.8} step={0.1} value={targetG} onChange={e=>setTargetG(Number(e.target.value))} style={{flex:1,accentColor:C.green}}/>
                      <div style={{background:"#070c12",border:`1px solid ${C.green}44`,borderRadius:8,padding:"6px 12px",color:C.green,fontFamily:"'IBM Plex Mono',monospace",fontSize:13,minWidth:90,textAlign:"center",fontWeight:700}}>{targetG.toFixed(1)} g/L</div>
                    </div>
                    <div style={{marginTop:10,position:"relative",height:6,background:"#1c2a38",borderRadius:99}}>
                      <div style={{position:"absolute",left:0,width:"25%",height:"100%",borderRadius:"99px 0 0 99px",background:"rgba(239,68,68,0.3)"}}/>
                      <div style={{position:"absolute",left:"25%",width:"50%",height:"100%",background:"rgba(34,197,94,0.25)"}}/>
                      <div style={{position:"absolute",left:"75%",right:0,height:"100%",borderRadius:"0 99px 99px 0",background:"rgba(245,158,11,0.3)"}}/>
                      <div style={{position:"absolute",top:-4,left:`${Math.min(Math.max(((targetG-1.0)/0.8)*50+25,0),100)}%`,width:14,height:14,borderRadius:"50%",background:C.green,border:"2px solid #07090f",transform:"translateX(-50%)",transition:"left 0.3s"}}/>
                    </div>
                    <div style={{fontSize:10,color:C.green,marginTop:6,fontWeight:700}}>Votre cible : {targetG.toFixed(1)} g/L</div>
                  </div>

                  <div style={{marginBottom:8}}>
                    <label style={lbl}>Vitesse de digestion par défaut</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      {Object.entries(DIGESTION_PROFILES).map(([key,dp])=>(
                        <button key={key} onClick={()=>setDigestion(key)} style={{padding:"10px",border:`1px solid ${digestion===key?"#0ea5e9":C.border}`,borderRadius:10,background:digestion===key?"rgba(14,165,233,0.12)":"#070c12",color:digestion===key?"#7dd3fc":C.muted,fontFamily:"'IBM Plex Mono',monospace",fontSize:11,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                          <div style={{fontSize:16,marginBottom:3}}>{dp.icon}</div>
                          <div style={{fontWeight:digestion===key?700:400,marginBottom:2}}>{dp.label}</div>
                          <div style={{fontSize:9,color:digestion===key?"#4a8fa8":"#2d3f50"}}>Pic {dp.peakMin}min · Fin {Math.round(dp.tail/60*10)/10}h</div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* FLOATING CTA */}
          {tab==="repas"&&(
            <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"10px 20px 16px",background:"linear-gradient(0deg,#07090f 60%,transparent)",maxWidth:520,margin:"0 auto"}}>
              <button onClick={()=>{if(canCalc){calculate();}else if(selections.length>0){setTab("saisie");}}} style={{width:"100%",padding:15,borderRadius:12,cursor:"pointer",background:canCalc?"linear-gradient(135deg,#0ea5e9,#0284c7)":selections.length>0?"linear-gradient(135deg,#1c3a50,#0d2233)":C.card,border:canCalc?"none":`1px solid ${C.border}`,color:canCalc?"#fff":selections.length>0?"#7dd3fc":C.muted,fontSize:13,fontWeight:700,fontFamily:"'Syne Mono',monospace"}}>
                {canCalc?`⚡ Calculer le calendrier — ${totalCarbs}g glucides`:selections.length>0?`→ Saisir glycémie + poids (${totalCarbs}g sélectionnés)`:"← Sélectionner des aliments"}
              </button>
            </div>
          )}
        </div>
      );
    }

    // Render the app
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // Service worker registration failed, app will still work offline to limited extent
      });
    }

    // Add to home screen prompt for Android
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });
  </script>
</body>
</html>
